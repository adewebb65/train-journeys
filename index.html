<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Train Journeys</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Train Journeys">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">

  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Train+Journeys%22%2C%22short_name%22%3A%22Trains%22%2C%22id%22%3A%22train-journeys-ade-2026%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a1a2e%22%2C%22theme_color%22%3A%22%231a1a2e%22%7D">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .refresh-btn {
      background: none;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.8;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .refresh-btn:active { opacity: 0.5; }

    .refresh-btn .spin {
      display: inline-block;
      transition: transform 0.6s;
    }

    .refresh-btn.spinning .spin {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sync-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      font-size: 11px;
      background: #16213e;
      color: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    .sync-dot.stale { background: #f57c00; }
    .sync-dot.checking { background: #4a7cf7; animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e8ecf0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .filter-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #d0d8e4;
      background: white;
      color: #555;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }

    .journey-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      padding: 4px 0;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:active { transform: scale(0.98); }
    .card.expanded { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }

    .card.new-journey {
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { padding: 16px; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .journey-type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #e8f4fd;
      color: #1a6fb5;
    }

    .journey-type-badge.return {
      background: #edf7ed;
      color: #2e7d32;
    }

    .cost-badge {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .route-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .station-name {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      flex: 1;
    }

    .station-name.dest { text-align: right; }

    .route-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .arrow-line {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #d0d8e4, #1a1a2e, #d0d8e4);
      position: relative;
    }

    .arrow-line::after {
      content: '▶';
      position: absolute;
      right: -6px;
      top: -7px;
      font-size: 10px;
      color: #1a1a2e;
    }

    .route-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }

    .route-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .time-tag {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }

    .date-row .icon { opacity: 0.5; font-size: 14px; }

    .return-preview {
      border-top: 1px solid #f0f2f5;
      padding: 10px 16px;
      background: #fafbfc;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .return-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .return-info {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .card-details {
      display: none;
      border-top: 1px solid #f0f2f5;
    }

    .card.expanded .card-details { display: block; }

    .detail-section { padding: 14px 16px; }
    .detail-section + .detail-section { border-top: 1px solid #f0f2f5; }

    .detail-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #888;
      margin-bottom: 12px;
    }

    .leg {
      position: relative;
      padding-left: 24px;
      margin-bottom: 14px;
    }

    .leg:last-child { margin-bottom: 0; }

    .leg::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 22px;
      bottom: -10px;
      width: 2px;
      background: #e0e6ee;
    }

    .leg:last-child::before { display: none; }

    .leg-dot {
      position: absolute;
      left: 4px;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid white;
      box-shadow: 0 0 0 2px #1a1a2e;
    }

    .leg-time { font-size: 15px; font-weight: 700; color: #1a1a2e; line-height: 1; }
    .leg-station { font-size: 14px; font-weight: 600; color: #333; margin: 2px 0; }
    .leg-operator { font-size: 12px; color: #888; }

    .leg-ticket {
      font-size: 11px;
      color: #1a6fb5;
      background: #e8f4fd;
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 3px;
    }

    .change-marker {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0 6px 24px;
      font-size: 12px;
      color: #f57c00;
      font-weight: 500;
    }

    .change-marker::before { content: '⏱'; }

    .cost-rows { display: flex; flex-direction: column; gap: 6px; }

    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 13px;
      color: #444;
    }

    .cost-row .desc { flex: 1; padding-right: 12px; color: #666; }
    .cost-row .amount { font-weight: 600; white-space: nowrap; }

    .cost-row.total {
      border-top: 1px solid #e8ecf0;
      margin-top: 6px;
      padding-top: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .cost-row.fee { font-size: 12px; color: #aaa; }

    .booking-ref { font-size: 12px; color: #aaa; margin-top: 4px; }

    .expand-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      font-size: 12px;
      color: #888;
      font-weight: 500;
      gap: 4px;
      border-top: 1px solid #f0f2f5;
    }

    .expand-toggle .chevron {
      display: inline-block;
      transition: transform 0.3s;
    }

    .card.expanded .expand-toggle .chevron { transform: rotate(180deg); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: #888; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    .last-updated {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      padding: 16px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0f1117; color: #e8ecf0; }
      .card { background: #1e2130; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
      .filter-bar { background: #1e2130; border-color: #2a2f45; }
      .filter-btn { background: #1e2130; border-color: #2a2f45; color: #aaa; }
      .filter-btn.active { background: #4a7cf7; border-color: #4a7cf7; color: white; }
      .station-name { color: #e8ecf0; }
      .cost-badge { color: #e8ecf0; }
      .return-preview { background: #181c28; border-color: #2a2f45; }
      .card-details { border-color: #2a2f45; }
      .detail-section + .detail-section { border-color: #2a2f45; }
      .expand-toggle { border-color: #2a2f45; color: #666; }
      .leg::before { background: #2a2f45; }
      .leg-dot { background: #4a7cf7; box-shadow: 0 0 0 2px #4a7cf7; }
      .leg-time { color: #e8ecf0; }
      .leg-station { color: #ccc; }
      .cost-row.total { color: #e8ecf0; border-color: #2a2f45; }
      .sync-bar { background: #0f1117; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🚆 My Train Journeys</h1>
      <p id="subtitle">Loading journeys...</p>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
      <span class="spin">↻</span> Refresh
    </button>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncStatus">Checking...</span>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
  <button class="filter-btn" onclick="setFilter('past', this)">Past</button>
</div>

<div class="journey-list" id="journeyList">
  <div class="empty-state">
    <div class="icon">🚆</div>
    <h3>Loading journeys...</h3>
    <p>Fetching your train journey data.</p>
  </div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
  let allJourneys = [];
  let currentFilter = 'all';
  let lastUpdatedTimestamp = null;
  let knownIds = new Set();
  const POLL_INTERVAL = 5 * 60 * 1000; // 5 minutes

  function setSyncStatus(state, text) {
    const dot = document.getElementById('syncDot');
    const status = document.getElementById('syncStatus');
    dot.className = 'sync-dot' + (state !== 'ok' ? ' ' + state : '');
    status.textContent = text;
  }

  async function loadJourneys(isManual = false) {
    const btn = document.getElementById('refreshBtn');
    if (isManual) {
      btn.classList.add('spinning');
    }
    setSyncStatus('checking', 'Checking for new journeys...');

    try {
      const res = await fetch('data.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const newTimestamp = data.lastUpdated || null;
      const incoming = data.journeys || [];

      // Detect newly added journeys since last load
      const newIds = incoming.map(j => j.id).filter(id => !knownIds.has(id));

      allJourneys = incoming;
      incoming.forEach(j => knownIds.add(j.id));

      if (newTimestamp) {
        const updated = new Date(newTimestamp);
        const now = new Date();
        const ageMs = now - updated;
        const ageMin = Math.round(ageMs / 60000);
        const ageStr = ageMin < 2 ? 'just now'
          : ageMin < 60 ? `${ageMin} min ago`
          : `${Math.round(ageMin / 60)}h ago`;

        document.getElementById('lastUpdated').textContent = 'Last synced: ' + updated.toLocaleString('en-GB');

        const isStale = ageMs > 90 * 60 * 1000; // stale after 90 min
        setSyncStatus(isStale ? 'stale' : 'ok',
          isStale ? `Sync overdue · last ran ${ageStr}` : `Up to date · synced ${ageStr}`);
      } else {
        setSyncStatus('stale', 'Never synced');
        document.getElementById('lastUpdated').textContent = '';
      }

      renderJourneys(newIds);

    } catch (e) {
      setSyncStatus('stale', 'Could not reach data.json');
      if (allJourneys.length === 0) {
        document.getElementById('journeyList').innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>No journeys yet</h3>
            <p>Your Trainline booking confirmations will appear here automatically once the hourly sync runs.</p>
          </div>`;
      }
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function manualRefresh() {
    loadJourneys(true);
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderJourneys();
  }

  function renderJourneys(highlightIds = []) {
    const now = new Date();
    const list = document.getElementById('journeyList');

    let journeys = [...allJourneys].sort((a, b) => {
      const da = new Date(a.outbound?.isoDate || a.single?.isoDate);
      const db = new Date(b.outbound?.isoDate || b.single?.isoDate);
      return db - da;
    });

    if (currentFilter === 'upcoming') {
      journeys = journeys.filter(j => {
        const d = new Date(j.outbound?.isoDate || j.single?.isoDate);
        return d >= now;
      }).reverse();
    } else if (currentFilter === 'past') {
      journeys = journeys.filter(j => {
        const d = new Date(j.outbound?.isoDate || j.single?.isoDate);
        return d < now;
      });
    }

    document.getElementById('subtitle').textContent =
      `${allJourneys.length} journey${allJourneys.length !== 1 ? 's' : ''} tracked`;

    if (journeys.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>No journeys here</h3><p>Try a different filter.</p></div>`;
      return;
    }

    let html = '';
    let lastSection = null;

    journeys.forEach(j => {
      const mainLeg = j.outbound || j.single;
      const d = new Date(mainLeg.isoDate);
      const isUpcoming = d >= now;
      const section = isUpcoming ? 'upcoming' : d.getFullYear().toString();

      if (currentFilter === 'all' && section !== lastSection) {
        html += `<div class="section-label">${isUpcoming ? '🗓 Upcoming' : section}</div>`;
        lastSection = section;
      }

      html += buildCard(j, highlightIds.includes(j.id));
    });

    list.innerHTML = html;
  }

  function buildCard(j, isNew = false) {
    const isReturn = j.type === 'return';
    const mainLeg = j.outbound || j.single;
    const returnLeg = j.return;

    const badge = isReturn
      ? `<span class="journey-type-badge return">↩ Return</span>`
      : `<span class="journey-type-badge">→ Single</span>`;

    const costStr = j.cost?.total ? `£${j.cost.total.toFixed(2)}` : '';
    const changes = mainLeg.changes === 0 ? 'Direct'
      : mainLeg.changes === 1 ? '1 change' : `${mainLeg.changes} changes`;

    const returnPreview = isReturn && returnLeg ? `
      <div class="return-preview">
        <div>
          <div class="return-label">Return</div>
          <div class="return-info">${returnLeg.dateDisplay} · ${returnLeg.departure}</div>
        </div>
        <div class="time-tag">${returnLeg.from} → ${returnLeg.to.split(' ')[0]}</div>
      </div>` : '';

    const newClass = isNew ? ' new-journey' : '';

    return `
      <div class="card${newClass}" id="card-${j.id}" onclick="toggleCard('${j.id}')">
        <div class="card-header">
          <div class="card-top">
            ${badge}
            <span class="cost-badge">${costStr}</span>
          </div>
          <div class="route-row">
            <span class="station-name">${mainLeg.from}</span>
            <div class="route-arrow"><div class="arrow-line"></div></div>
            <span class="station-name dest">${mainLeg.to}</span>
          </div>
          <div class="route-meta">
            <span class="time-tag">${mainLeg.departure} → ${mainLeg.arrival}</span>
            <span>${mainLeg.duration} · ${changes}</span>
          </div>
          <div class="date-row">
            <span class="icon">📅</span>
            <span>${mainLeg.dateDisplay}</span>
          </div>
        </div>
        ${returnPreview}
        <div class="expand-toggle">
          <span>Full journey details</span>
          <span class="chevron">▾</span>
        </div>
        <div class="card-details">
          ${buildDetails(j)}
        </div>
      </div>`;
  }

  function buildDetails(j) {
    let html = '';
    const mainLeg = j.outbound || j.single;
    html += buildLegSection(j.type === 'return' ? 'Outbound' : 'Journey', mainLeg);
    if (j.type === 'return' && j.return) {
      html += buildLegSection('Return', j.return);
    }

    if (j.cost) {
      html += `<div class="detail-section">
        <div class="detail-section-title">💳 Payment</div>
        <div class="cost-rows">`;

      (j.cost.items || []).forEach(item => {
        html += `<div class="cost-row">
          <span class="desc">${item.description}</span>
          <span class="amount">£${item.price.toFixed(2)}</span>
        </div>`;
      });

      if (j.cost.bookingFee) {
        html += `<div class="cost-row fee">
          <span class="desc">Booking fee</span>
          <span class="amount">£${j.cost.bookingFee.toFixed(2)}</span>
        </div>`;
      }

      html += `<div class="cost-row total">
          <span class="desc">Total</span>
          <span class="amount">£${j.cost.total.toFixed(2)}</span>
        </div></div>`;

      if (j.bookingRef) {
        html += `<div class="booking-ref">Booking ref: ${j.bookingRef}</div>`;
      }

      html += `</div>`;
    }

    return html;
  }

  function buildLegSection(label, leg) {
    if (!leg || !leg.legs) return '';

    let html = `<div class="detail-section">
      <div class="detail-section-title">${label === 'Return' ? '↩' : '→'} ${label} · ${leg.dateDisplay}</div>`;

    leg.legs.forEach((l, i) => {
      html += `<div class="leg">
        <div class="leg-dot"></div>
        <div class="leg-time">${l.departure}</div>
        <div class="leg-station">${l.from}</div>
        <div class="leg-operator">${l.operator}</div>
        ${l.ticketType ? `<div class="leg-ticket">${l.ticketType}</div>` : ''}
      </div>`;

      if (l.changeMinutes) {
        const nextStation = leg.legs[i + 1]?.from || '';
        html += `<div class="change-marker">${l.changeMinutes} min connection at ${nextStation}</div>`;
      }
    });

    html += `<div class="leg">
      <div class="leg-dot"></div>
      <div class="leg-time">${leg.arrival}</div>
      <div class="leg-station">${leg.to}</div>
    </div></div>`;

    return html;
  }

  function toggleCard(id) {
    document.getElementById('card-' + id).classList.toggle('expanded');
  }

  // Initial load
  loadJourneys();

  // Poll every 5 minutes
  setInterval(loadJourneys, POLL_INTERVAL);

  // Refresh when tab becomes visible again (e.g. switching back on phone)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadJourneys();
  });
</script>
</body>
</html>
